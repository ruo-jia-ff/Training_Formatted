name: Claude AI Assistant

on:
    issues:
      types: [opened, reopened]
    issue_comment:
      types: [created]
    pull_request:
      types: [opened, reopened, synchronize]
    pull_request_review_comment:
      types: [created]

jobs:
    claude-respond-to-issue:
      if: github.event_name == 'issues' || (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
      runs-on: ubuntu-latest
      permissions:
        issues: write
        contents: write
      steps:
        - uses: actions/checkout@v4

        - name: Respond to issue with Claude
          uses: anthropics/claude-code-action@beta
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            trigger_phrase: "@claude"
            claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    claude-review-pr:
      if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review_comment'
      runs-on: ubuntu-latest
      permissions:
        pull-requests: write
        contents: write
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Review PR with Claude
          uses: anthropics/claude-code-action@beta
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            trigger_phrase: "@claude"
            claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
